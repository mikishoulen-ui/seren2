async function uploadCloud(file,onProg,type="video"){
  const fd=new FormData();fd.append("file",file);fd.append("upload_preset",CPRESET);
  return new Promise((res,rej)=>{
    const x=new XMLHttpRequest();
    // "auto" detecta automáticamente si es video, imagen, etc — evita el error 400
    x.open("POST",`https://api.cloudinary.com/v1_1/${CNAME}/auto/upload`);
    x.upload.onprogress=e=>{if(e.lengthComputable)onProg(Math.round(e.loaded/e.total*100));};
    x.onload=()=>{
      try{
        const d=JSON.parse(x.responseText);
        if(d.secure_url)res(d.secure_url);
        else rej(new Error(d.error?.message||"Error de Cloudinary: "+x.status));
      }catch(e){rej(new Error("Respuesta inválida"));}
    };
    x.onerror=()=>rej(new Error("Error de red"));
    x.send(fd);
  });
}

function scoreVideos(videos){
  const now=Date.now();
  return videos.map(v=>{
    const ageSec=Math.max(1,(now-new Date(v.created_at))/1000);
    const agePen=Math.pow(ageSec/3600,1.5);
    const score=((v.likes||0)*3+(v.comments||0)*5+(v.shares||0)*2)/agePen;
    return{...v,_score:score};
  }).sort((a,b)=>b._score-a._score);
}

// ── STORIES BAR ──
function StoriesBar({user,uname,av,col,onAddStory,refreshKey}){
  const [stories,setStories]=useState([]),[viewing,setViewing]=useState(null),[myHas,setMyHas]=useState(false);
  const [progress,setProgress]=useState(0);
  const timer=useRef();

  useEffect(()=>{
    if(!user)return;
    const cutoff=new Date(Date.now()-24*60*60*1000).toISOString();
    sb.from("stories").select("*").gt("created_at",cutoff).order("created_at",{ascending:false})
      .then(({data})=>{
        const d=data||[];
        setMyHas(d.some(s=>s.user_id===user.id));
        const seen=new Map();
        d.forEach(s=>{if(!seen.has(s.user_id))seen.set(s.user_id,s);});
        setStories([...seen.values()]);
      });
  },[user,refreshKey]);

  const openStory=s=>{setViewing(s);setProgress(0);clearInterval(timer.current);timer.current=setInterval(()=>{setProgress(p=>{if(p>=100){clearInterval(timer.current);setViewing(null);return 0;}return p+2;});},100);};
  useEffect(()=>()=>clearInterval(timer.current),[]);

  return h("div",{style:{background:"#fff",borderBottom:"1px solid var(--border)"}},
    h("div",{style:{overflowX:"auto",display:"flex",gap:14,padding:"12px 14px 14px"}},

// Preferencia del usuario — persiste en localStorage entre recargas y actualizaciones
// false = con sonido (default), true = mudo
let _userWantsMuted=localStorage.getItem("hilda_vol_muted")==="1";
// _globalMuted SIEMPRE refleja _userWantsMuted — nunca se cambia por bloqueos del navegador
let _globalMuted=_userWantsMuted;

// ── FEED CARD — video optimizado + fotos ──
function FeedCard({item,user,uname,isActive,onComments,onShare,onViewUser,savedVideoIds,onToggleSave}){
  const isVideo=item.type==="video";
  const id=item.id,ownerId=item.user_id,ownerName=item.username;
  const [liked,setLiked]=useState(false),[likes,setLikes]=useState(item.likes||0),[cmts,setCmts]=useState(item.comments||0);
  const [muted,setMuted]=useState(()=>_globalMuted),[paused,setPaused]=useState(false);
  const [following,setFollowing]=useState(false),[saved,setSaved]=useState(false);
  const vRef=useRef();
  const grad=useRef(rg()).current;

  useEffect(()=>{setSaved(savedVideoIds?.has(id)??false);},[savedVideoIds,id]);
  useEffect(()=>{if(!user||ownerId===user.id)return;sb.from("follows").select("id").eq("follower_id",user.id).eq("following_id",ownerId).maybeSingle().then(({data})=>{if(data)setFollowing(true);});},[ownerId,user]);
  useEffect(()=>{
    if(!user)return;
    const tbl=isVideo?"likes":"photo_likes";const fld=isVideo?"video_id":"photo_id";
    sb.from(tbl).select("id").eq("user_id",user.id).eq(fld,id).maybeSingle().then(({data})=>{if(data)setLiked(true);});
  },[id,user]);

  useEffect(()=>{
    const v=vRef.current;
    if(v)v.muted=muted;
    // Guardar preferencia del usuario — AMBAS variables sincronizadas
    _globalMuted=muted;
    _userWantsMuted=muted;

const {useMemo}=React;
function Feed({videos,photos,user,uname,onComments,onShare,onViewUser,savedVideoIds,onToggleSave,onAddStory,av,col,refreshStories}){
  const [activeIdx,setActiveIdx]=useState(0);
  const ref=useRef();
  const items=useMemo(()=>{
    const vs=(videos||[]).map(v=>({...v,type:"video"}));
    const ps=(photos||[]).map(p=>({...p,type:"photo"}));
    // Sort by created_at descending so newest content always appears near top
    return [...vs,...ps].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  },[videos,photos]);
  useEffect(()=>{const el=ref.current;if(!el)return;
    // Use IntersectionObserver for precise active detection
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(entry=>{
        const v=entry.target.querySelector("video");
        if(!v)return;
        // Don't activate if any overlay/modal is open
        const anyOpen=document.querySelector("[data-overlay]");
        if(entry.isIntersecting&&entry.intersectionRatio>0.7&&!anyOpen){
          el.querySelectorAll("video").forEach(ov=>{if(ov!==v){ov.pause();ov.muted=true;}});
          v.muted=_globalMuted;
          v.play().catch(()=>{
            // El navegador bloqueó autoplay con sonido (política de autoplay)
            // Solo mutamos ESTE video — NO cambiamos _globalMuted ni _userWantsMuted
            // Así el siguiente video recuerda la preferencia del usuario
            v.muted=true;
            v.play().catch(()=>{});
          });
        }else{
          v.pause();v.muted=true; // mute mientras no está visible (se restaura al volver)
        }
      });
    },{threshold:0.7});
    // Observe all feed cards
    const observe=()=>el.querySelectorAll("[data-feedcard]").forEach(c=>obs.observe(c));
    observe();
    const mo=new MutationObserver(observe);
    mo.observe(el,{childList:true});
    return()=>{obs.disconnect();mo.disconnect();};
  },[]);
  return h("div",{ref,style:{height:"100vh",overflowY:"scroll",scrollSnapType:"y mandatory",WebkitOverflowScrolling:"touch"}},
    items.length===0&&h("div",{style:{height:"100vh",scrollSnapAlign:"start",background:"var(--page)",display:"flex",flexDirection:"column",paddingTop:60,paddingBottom:80,overflowY:"auto"}},
      h(StoriesBar,{user,uname,av,col,onAddStory,refreshKey:refreshStories}),

        h("div",{style:{fontSize:44,marginBottom:12}},"🎬"),
        h("p",{style:{color:"var(--text)",fontSize:15,fontWeight:700,marginBottom:6}},"Sin contenido aún"),
        h("p",{style:{color:"var(--muted)",fontSize:13}},"Sube un video o foto para empezar")
      )
    ),
    items.length>0&&h("div",{style:{scrollSnapAlign:"start",flexShrink:0,background:"var(--page)",paddingTop:60,paddingBottom:8}},
      h(StoriesBar,{user,uname,av,col,onAddStory,refreshKey:refreshStories})
    ),
    items.map((item,i)=>h(FeedCard,{key:item.id,item,user,uname,onComments,onShare,onViewUser,savedVideoIds,onToggleSave}))

}

  const [day,setDay]=useState(""),[month,setMonth]=useState(""),[year,setYear]=useState(""),[err,setErr]=useState("");

function GiftPanel({targetUserId,targetUsername,user,uname,onClose,onSent}){
  const [sending,setSending]=useState(null),[lastGift,setLastGift]=useState(null);
  const sendGift=async(g)=>{
    if(!user||sending)return;
    setSending(g.id);
    const hCut=parseFloat((g.price*0.3).toFixed(2));
    const cCut=parseFloat((g.price*0.7).toFixed(2));
    // For now we record in notifications as gift type
    await sb.from("notifications").insert({
      receiver_id:targetUserId,sender_id:user.id,
      sender_username:uname,
      type:"gift",
      read:false
    });
    // Also record in live_gifts if table exists (best effort)
    sb.from("live_gifts").insert({
      live_id:"00000000-0000-0000-0000-000000000000",
      sender_id:user.id,sender_username:uname,
      gift_id:g.id,gift_emoji:g.ic,gift_name:g.name,
      amount:g.price,hilda_cut:hCut,creator_cut:cCut
    }).then(()=>{});
    setLastGift(g);
    setSending(null);
    setTimeout(()=>{setLastGift(null);if(onSent)onSent(g);},2200);
  };
  return h(Sheet,{onClose,title:"🎁 Enviar regalo a @"+targetUsername},
    h("div",{style:{padding:"16px 14px 24px"}},
      lastGift&&h("div",{style:{textAlign:"center",padding:"16px 0",marginBottom:12,background:"var(--skylt)",borderRadius:14,border:"1px solid var(--border)"}},
        h("div",{style:{fontSize:52,marginBottom:4}},lastGift.ic),

        h("p",{style:{color:"var(--muted)",fontSize:12}},"@"+targetUsername+" recibió tu regalo")
      ),
      h("p",{style:{color:"var(--muted)",fontSize:12,marginBottom:14,textAlign:"center"}},"70% va al creador · 30% para Hilda"),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},

function PrivatePostViewer({post,currentUser,uname,onClose,onUpdated}){

  const [showCmts,setShowCmts]=useState(false),[showShare,setShowShare]=useState(false);

    if(!currentUser)return;
    sb.from("private_likes").select("id").eq("user_id",currentUser.id).eq("post_id",post.id).maybeSingle().then(({data})=>{if(data)setLiked(true);});
    sb.from("private_saved").select("id").eq("user_id",currentUser.id).eq("post_id",post.id).maybeSingle().then(({data})=>{if(data)setSaved(true);});
  },[post.id,currentUser]);

    onUpdated&&onUpdated({...post,likes:liked?likes-1:likes+1});
  };
  const toggleSave=async e=>{e.stopPropagation();if(!currentUser)return;
    if(saved){setSaved(false);await sb.from("private_saved").delete().eq("user_id",currentUser.id).eq("post_id",post.id);}

    h("span",{style:{color:"#fff",fontSize:10,fontWeight:700,textShadow:"0 1px 4px rgba(0,0,0,0.9)"}},label)

    h("div",{onClick:e=>e.stopPropagation(),style:{width:"100%",position:"relative",display:"flex",alignItems:"center"}},
      // Media
      post.media_type==="video"
        ?h("video",{src:post.media_url,autoPlay:true,controls:true,playsInline:true,loop:true,style:{width:"100%",maxHeight:"85vh",objectFit:"contain",display:"block"}})
        :h("img",{src:post.media_url,style:{width:"100%",maxHeight:"85vh",objectFit:"contain",display:"block"}}),
      // Close btn
      h("button",{onClick:onClose,style:{position:"absolute",top:10,left:10,background:"rgba(0,0,0,0.6)",border:"none",color:"#fff",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}},"✕"),
      // Caption
      post.caption&&h("div",{style:{position:"absolute",bottom:0,left:0,right:60,padding:"10px 14px",background:"linear-gradient(transparent,rgba(0,0,0,0.85))"}},

function LiveStream({user,uname,av,col,onClose}){

  const [camErr,setCamErr]=useState(null),[agoraErr,setAgoraErr]=useState(null);
  const [remoteUsers,setRemoteUsers]=useState([]);
  // Co-host invite system
  const [showInvite,setShowInvite]=useState(false);
  const [inviteSearch,setInviteSearch]=useState(""),[inviteResults,setInviteResults]=useState([]);
  const [coHosts,setCoHosts]=useState([]); // {uid, username, avatar_url}

  const [isCoHost,setIsCoHost]=useState(false);
  const localVideoRef=useRef(),pollRef=useRef(),chatBot=useRef(),invPollRef=useRef();
  const camTrackRef=useRef(null);
  const agoraClient=useRef(null),localTracks=useRef({audio:null,video:null});
  const myNumUid=useRef(user?parseInt(user.id.replace(/-/g,"").slice(0,8),16)%100000:Math.floor(Math.random()*99999));

  const loadLives=async()=>{
    const {data}=await sb.from("lives").select("*").eq("is_live",true).order("created_at",{ascending:false});
    setLives(data||[]);setLoadingLives(false);
  };
  const loadChat=useCallback(async(lid)=>{
    const {data}=await sb.from("live_chat").select("*").eq("live_id",lid).order("created_at",{ascending:true}).limit(80);
    setChat(data||[]);
    setTimeout(()=>chatBot.current?.scrollIntoView({behavior:"smooth"}),80);
  },[]);
  useEffect(()=>{
    loadLives();
    const t=setInterval(loadLives,10000);
    // Check if current user has pending invite
    if(user){
      invPollRef.current=setInterval(async()=>{
        const {data}=await sb.from("live_invites").select("*").eq("invitee_id",user.id).eq("status","pending").order("created_at",{ascending:false}).limit(1);
        if(data&&data.length>0)setPendingInvite(data[0]);
        else setPendingInvite(null);
      },4000);
    }
    return()=>{clearInterval(t);clearInterval(invPollRef.current);cleanupAgora();};
  },[]);

  const cleanupAgora=async()=>{
    clearInterval(pollRef.current);
    if(localTracks.current.audio){localTracks.current.audio.stop();localTracks.current.audio.close();}
    if(localTracks.current.video){localTracks.current.video.stop();localTracks.current.video.close();}
    if(agoraClient.current){try{await agoraClient.current.leave();}catch(e){}}
    localTracks.current={audio:null,video:null};agoraClient.current=null;
  };

  const setupAgoraHandlers=(client,lid)=>{
    client.on("user-published",async(remUser,mediaType)=>{
      await client.subscribe(remUser,mediaType);
      if(mediaType==="video"){
        setRemoteUsers(prev=>[...prev.filter(u=>u.uid!==remUser.uid),remUser]);
        const tryPlay=()=>{
          const el=document.getElementById("rv-"+remUser.uid);
          if(el){remUser.videoTrack.play(el);return true;}return false;
        };
        if(!tryPlay()){let n=0;const iv=setInterval(()=>{if(tryPlay()||++n>30)clearInterval(iv);},200);}
      }
      if(mediaType==="audio")remUser.audioTrack?.play();
    });
    client.on("user-unpublished",(remUser,mediaType)=>{if(mediaType==="video")setRemoteUsers(prev=>prev.filter(u=>u.uid!==remUser.uid));});
    client.on("user-left",(remUser)=>setRemoteUsers(prev=>prev.filter(u=>u.uid!==remUser.uid)));
  };

  const joinAgoraAsHost=async(client)=>{
    await client.setClientRole("host");
    await client.join(AGORA_APP_ID,AGORA_CHANNEL,AGORA_TOKEN,myNumUid.current);
    const [micTrack,camTrack]=await AgoraRTC.createMicrophoneAndCameraTracks();
    localTracks.current={audio:micTrack,video:camTrack};
    await client.publish([micTrack,camTrack]);
    return camTrack;
  };

  const startBroadcast=async()=>{
    if(AGORA_APP_ID==="TU_APP_ID_AQUI"){setAgoraErr("Configura tu App ID de Agora");return;}

      });
      const client=AgoraRTC.createClient({mode:"live",codec:"vp8"});
      agoraClient.current=client;
      setupAgoraHandlers(client,lv.id);
      const camTrack=await joinAgoraAsHost(client);

        camTrackRef.current=track;
        const tryP=()=>{const el=document.getElementById("local-video-hilda");if(el){track.play(el);return true;}return false;};
        if(!tryP()){let n=0;const iv=setInterval(()=>{if(tryP()||++n>30)clearInterval(iv);},150);}
      };

        loadChat(lv.id);
        const {data:g}=await sb.from("live_gifts").select("creator_cut").eq("live_id",lv.id);
        setTotalGifts((g||[]).reduce((s,x)=>s+(x.creator_cut||0),0));

        if(ld){setViewers(ld.viewers||0);setCoHosts(ld.co_hosts||[]);}
      },3000);
      setScreen("broadcast");
    }catch(e){
      console.error("Live error:",e);
      if(createdId)await sb.from("lives").update({is_live:false}).eq("id",createdId);
      await cleanupAgora();
      if(e.message&&(e.message.includes("Permission")||e.message.includes("NotAllowed")))setCamErr("Permite cámara y micrófono en el navegador");

    if(liveId)await sb.from("lives").update({is_live:false}).eq("id",liveId);
    // Cancel all pending invites
    if(liveId)await sb.from("live_invites").update({status:"cancelled"}).eq("live_id",liveId);
    clearInterval(pollRef.current);
    setScreen("list");setLiveId(null);setLiveRec(null);setChat([]);setCoHosts([]);loadLives();
  };

  const searchInvite=async(q)=>{
    setInviteSearch(q);
    if(!q.trim()){setInviteResults([]);return;}
    const {data}=await sb.from("profiles").select("id,username,avatar_url,avatar_color").ilike("username",`%${q}%`).neq("id",user.id).limit(6);
    setInviteResults(data||[]);
  };

  const sendInvite=async(targetUser)=>{
    if(coHosts.length>=5){alert("Máximo 6 personas en el live (tú + 5)");return;}
    await sb.from("live_invites").insert({live_id:liveId,inviter_id:user.id,inviter_username:uname,invitee_id:targetUser.id,invitee_username:targetUser.username,status:"pending"});
    await sb.from("notifications").insert({receiver_id:targetUser.id,sender_id:user.id,sender_username:uname,type:"live_invite",read:false});
    setInviteSearch("");setInviteResults([]);setShowInvite(false);
    alert("Invitación enviada a @"+targetUser.username+" 🎉");
  };

  const acceptInvite=async()=>{
    if(!pendingInvite)return;
    try{
      await sb.from("live_invites").update({status:"accepted"}).eq("id",pendingInvite.id);
      const client=AgoraRTC.createClient({mode:"live",codec:"vp8"});
      agoraClient.current=client;
      setupAgoraHandlers(client,pendingInvite.live_id);
      const camTrack=await joinAgoraAsHost(client);
      setLiveId(pendingInvite.live_id);
      setIsCoHost(true);
      // Update co_hosts in DB
      const {data:lv}=await sb.from("lives").select("co_hosts").eq("id",pendingInvite.live_id).single();
      const existing=lv?.co_hosts||[];
      await sb.from("lives").update({co_hosts:[...existing,{uid:myNumUid.current,username:uname,avatar_url:av}]}).eq("id",pendingInvite.live_id);
      const playLocal2=(track)=>{
        camTrackRef.current=track;
        const tryP=()=>{const el=document.getElementById("local-video-hilda");if(el){track.play(el);return true;}return false;};
        if(!tryP()){let n=0;const iv=setInterval(()=>{if(tryP()||++n>30)clearInterval(iv);},150);}
      };
      setTimeout(()=>playLocal2(camTrack),300);
      loadChat(pendingInvite.live_id);
      pollRef.current=setInterval(()=>loadChat(pendingInvite.live_id),3000);
      setPendingInvite(null);
      setScreen("broadcast");
    }catch(e){setAgoraErr("Error al unirse: "+e.message);}
  };

  const declineInvite=async()=>{
    if(!pendingInvite)return;
    await sb.from("live_invites").update({status:"declined"}).eq("id",pendingInvite.id);

  const joinLive=async(live)=>{
    if(AGORA_APP_ID==="TU_APP_ID_AQUI"){setAgoraErr("Configura tu App ID de Agora");return;}
    setAgoraErr(null);setLiveRec(live);
    try{
      const client=AgoraRTC.createClient({mode:"live",codec:"vp8"});
      agoraClient.current=client;
      await client.setClientRole("audience",{level:1});
      const numUid=Math.floor(Math.random()*900000)+100000;
      await client.join(AGORA_APP_ID,AGORA_CHANNEL,AGORA_TOKEN,numUid);

// ── STATS ──
function Stats({user,uname,onClose}){
  const [data,setData]=useState(null),[load,setLoad]=useState(true);
  useEffect(()=>{
    if(!user)return;
    Promise.all([
      sb.from("videos").select("id,likes,comments,shares,created_at").eq("user_id",user.id),
      sb.from("photos").select("id,likes,comments,created_at").eq("user_id",user.id),
      sb.from("follows").select("id").eq("following_id",user.id),
      sb.from("follows").select("id").eq("follower_id",user.id),
      sb.from("live_gifts").select("creator_cut").eq("live_id","00000000-0000-0000-0000-000000000000"),
    ]).then(([{data:vids},{data:photos},{data:followers},{data:following},{data:gifts}])=>{
      const totalLikes=(vids||[]).reduce((s,v)=>s+(v.likes||0),0)+(photos||[]).reduce((s,p)=>s+(p.likes||0),0);
      const totalComments=(vids||[]).reduce((s,v)=>s+(v.comments||0),0)+(photos||[]).reduce((s,p)=>s+(p.comments||0),0);
      const totalEarnings=(gifts||[]).reduce((s,g)=>s+(g.creator_cut||0),0);
      setData({videos:(vids||[]).length,photos:(photos||[]).length,totalLikes,totalComments,followers:(followers||[]).length,following:(following||[]).length,totalEarnings});
      setLoad(false);
    });
  },[user]);

  const StatCard=(emoji,label,value,color)=>h("div",{style:{background:"#fff",borderRadius:14,padding:"14px 12px",textAlign:"center",border:"1px solid var(--border)",boxShadow:"0 2px 8px rgba(0,100,160,0.06)"}},
    h("div",{style:{fontSize:28,marginBottom:4}}),
    h("p",{style:{color:color||"var(--sky2)",fontSize:22,fontWeight:900,marginBottom:2}},value),
    h("p",{style:{color:"var(--muted)",fontSize:11}},emoji+" "+label)
  );

  return h("div",{style:{position:"fixed",inset:0,zIndex:500,background:"var(--page)",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column"}},
    HDR(onClose,"📊 Mis Estadísticas"),
    h("div",{style:{flex:1,overflowY:"auto",padding:14}},
      load?h("div",{style:{display:"flex",justifyContent:"center",padding:40}},h(Spin)):
      h("div",null,

// ── THEME PICKER ──

  pink:{name:"Rosa",bg:"#fff0f5",page:"#fff0f5",card:"#ffffff",sky:"#f472b6",sky2:"#db2777",border:"#fce7f3",text:"#4a1a2e"},
  purple:{name:"Violeta",bg:"#f5f0ff",page:"#f5f0ff",card:"#ffffff",sky:"#a855f7",sky2:"#7c3aed",border:"#ede9fe",text:"#2d1a4a"},
  green:{name:"Verde",bg:"#f0fff4",page:"#f0fff4",card:"#ffffff",sky:"#22c55e",sky2:"#16a34a",border:"#dcfce7",text:"#1a3a1a"},
  dark:{name:"Oscuro",bg:"#0f1a2a",page:"#0f1a2a",card:"#162032",sky:"#00b4d8",sky2:"#38e8ff",border:"rgba(0,180,216,0.2)",text:"#e0f4fb"},

function Personalization({onClose,onThemeChange}){
  const [current,setCurrent]=useState(()=>localStorage.getItem("hilda_theme")||"celeste");
  const apply=t=>{
    setCurrent(t);localStorage.setItem("hilda_theme",t);
    onThemeChange(THEMES[t]);
  };
  return h("div",{style:{position:"fixed",inset:0,zIndex:500,background:"var(--page)",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column"}},
    HDR(onClose,"🎨 Personalización"),
    h("div",{style:{flex:1,overflowY:"auto",padding:16}},
      h("p",{style:{color:"var(--muted)",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}},"Tema de color"),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}},
        Object.entries(THEMES).map(([key,t])=>h("button",{key,onClick:()=>apply(key),style:{background:t.card,border:current===key?"2.5px solid "+t.sky:"1.5px solid "+t.border,borderRadius:14,padding:"14px 12px",cursor:"pointer",textAlign:"center",boxShadow:current===key?"0 0 0 3px "+t.sky+"33":"0 2px 6px rgba(0,0,0,0.05)"}},
          h("div",{style:{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,"+t.sky+","+t.sky2+")",margin:"0 auto 8px",border:"2px solid "+t.border}}),
          h("p",{style:{color:t.text,fontSize:13,fontWeight:700}}),
          h("p",{style:{color:t.sky2,fontSize:13,fontWeight:800}},t.name),
          current===key&&h("div",{style:{marginTop:4,fontSize:11,color:t.sky2,fontWeight:700}},"✓ Activo")
        ))
      ),
      h("div",{style:{background:"#fff",borderRadius:14,padding:16,border:"1px solid var(--border)"}},
        h("p",{style:{color:"var(--text)",fontSize:13,fontWeight:700,marginBottom:4}},"💡 Próximamente"),
        h("p",{style:{color:"var(--muted)",fontSize:12,lineHeight:1.5}},"Más temas, tamaño de fuente y disposición del perfil estarán disponibles en futuras actualizaciones.")
      )

}

// ── INIT THEME on first load ──
(function(){
  try{
    const saved=localStorage.getItem("hilda_theme")||"celeste";
    const t=THEMES[saved]||THEMES.celeste;
    if(!t)return;
    const root=document.documentElement;
    Object.entries(t).forEach(([k,v])=>root.style.setProperty("--"+k,v));
    root.style.setProperty("--skymd",t.sky||"#7dd3e8");
    root.style.setProperty("--faint",t.page||"#f5fbff");
    root.style.setProperty("--bordermd",t.border||"#99d3ec");
    root.style.setProperty("--skylt","#e0f7fa");
  }catch(e){console.warn("Theme init:",e);}
})();

// ── APP ──

  useEffect(()=>{
    sb.from("videos").select("*").order("created_at",{ascending:false}).limit(80).then(({data})=>{setVideos(scoreVideos(data||[]));setLoadV(false);});

  },[showPrivate,showLive,showGallery,showProf,showEdit,showDM,showNotifs,showAddStory,showStats,showPersonal,viewUser,cmtData,shareData]);
  const toast2=msg=>{setToast(msg);setTimeout(()=>setToast(null),3000);};
  const handleAuth=(u,un,c,a)=>{setUser(u);setUname(un);setCol(c);setAv(a);toast2("¡Bienvenido, @"+un+"! ✦");sb.from("notifications").select("id",{count:"exact"}).eq("receiver_id",u.id).eq("read",false).then(({count})=>setUnread(count||0));sb.from("saved_videos").select("video_id").eq("user_id",u.id).then(({data:sv})=>setSavedVideoIds(new Set((sv||[]).map(r=>r.video_id))));};
  const handleLogout=async()=>{await sb.auth.signOut();setUser(null);setUname("");setAv(null);toast2("Sesión cerrada");setShowProf(false);};

  if(!user)return h(Auth,{onAuth:handleAuth});

  const homeScreen=()=>loadV

  const searchScreen=()=>h("div",{style:{paddingBottom:80,background:"var(--page)",minHeight:"100vh"}},
    h("div",{style:{padding:"12px 14px"}},
      h("div",{style:{position:"relative",marginBottom:14}},
        h("input",{value:search,onChange:e=>doSearch(e.target.value),placeholder:"Buscar usuarios...",style:{width:"100%",background:"#fff",border:"1.5px solid var(--border)",borderRadius:13,padding:"12px 14px 12px 42px",color:"var(--text)",fontSize:13,outline:"none",boxSizing:"border-box",boxShadow:"0 2px 8px rgba(0,100,160,0.06)"}}),
        h("span",{style:{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",fontSize:15,opacity:0.4}},"🔍")

      searchResults.length>0?searchResults.map(u=>h("div",{key:u.id,onClick:()=>setViewUser(u.id),style:{display:"flex",alignItems:"center",gap:11,padding:"12px 14px",borderRadius:14,background:"#fff",border:"1px solid var(--border)",marginBottom:8,cursor:"pointer",boxShadow:"0 1px 6px rgba(0,100,160,0.05)"}},h(Av,{u:u.username,col:u.avatar_color,av:u.avatar_url,sz:46}),h("p",{style:{color:"var(--text)",fontSize:13,fontWeight:700}},"@"+u.username))):
      !search&&h("div",{style:{textAlign:"center",padding:44}},h("div",{style:{fontSize:40,marginBottom:10}},"🔍"),h("p",{style:{color:"var(--muted)",fontSize:13}},"Busca usuarios por nombre"))

          h("div",{style:{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,#00b4d8,#0077b6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}},o.ic),
          h("div",null,h("p",{style:{color:"var(--text)",fontSize:14,fontWeight:700,margin:0}},o.lb),h("p",{style:{color:"var(--muted)",fontSize:12,margin:0}},o.desc))

  return h("div",{style:{background:"var(--page)",minHeight:"100vh",position:"relative"}},
    // Sticky header (non-home)
